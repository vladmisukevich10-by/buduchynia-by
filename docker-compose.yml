version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: buduchynia_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pacavaca22
      POSTGRES_DB: buduchynia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
